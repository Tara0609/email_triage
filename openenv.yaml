name: email-triage
version: "2.0.0"
description: >
  An OpenEnv environment that simulates real-world corporate email triage.
  Agents must classify urgency, extract action items, perform full
  multi-stakeholder triage, and rank emails by priority across 4 tasks
  (easy, medium, hard, hard).

author: Email Triage Team
license: MIT

environment:
  type: text
  runtime: python
  framework: fastapi

# ---------------------------------------------------------------------------
# Observation Space
# ---------------------------------------------------------------------------
observation_space:
  type: object
  properties:
    task_id:
      type: string
      description: Active task identifier — task_1 / task_2 / task_3 / task_4
    task_description:
      type: string
      description: Natural language instructions the agent must follow
    emails:
      type: array
      items:
        type: object
        properties:
          id:             { type: string }
          subject:        { type: string }
          sender:         { type: string }
          sender_email:   { type: string }
          body:           { type: string }
          timestamp:      { type: string, format: date-time }
          thread_id:      { type: string, nullable: true }
          thread_context: { type: string, nullable: true, description: "Previous message in thread, if any" }
          attachments:    { type: array, items: { type: string } }
    context:
      type: object
      description: Task metadata — action_type, difficulty, emails_processed, emails_remaining
    step_count:   { type: integer }
    max_steps:    { type: integer }

# ---------------------------------------------------------------------------
# Action Space — schema varies by observation.context.action_type
# ---------------------------------------------------------------------------
action_space:
  type: object
  description: >
    Submit one action per /step call. The required schema depends on
    observation.context.action_type returned by /reset.

  variants:

    classify_urgency:
      description: task_1 — label one email's urgency
      properties:
        email_id: { type: string }
        urgency:  { type: string, enum: [urgent, normal, low] }
        reason:   { type: string, nullable: true }
      required: [email_id, urgency]

    extract_actions:
      description: task_2 — extract all action items from one email
      properties:
        email_id:
          type: string
        action_items:
          type: array
          items:
            type: object
            properties:
              description: { type: string }
              assignee:    { type: string }
              due_date:    { type: string, nullable: true }
            required: [description, assignee]
        summary:
          type: string
      required: [email_id, action_items, summary]

    full_triage:
      description: task_3 — full multi-field triage of one complex email
      properties:
        email_id:   { type: string }
        urgency:    { type: string, enum: [urgent, normal, low] }
        department:
          type: string
          enum: [engineering, sales, support, hr, finance, legal, management]
        reply_subject: { type: string }
        action_items:
          type: array
          items:
            type: object
            properties:
              description: { type: string }
              assignee:    { type: string }
              due_date:    { type: string, nullable: true }
            required: [description, assignee]
        requires_immediate_response: { type: boolean }
        summary: { type: string }
      required:
        [email_id, urgency, department, reply_subject,
         action_items, requires_immediate_response, summary]

    prioritize_emails:
      description: task_4 — rank ALL emails from most to least urgent in a single action
      properties:
        ranked_email_ids:
          type: array
          items: { type: string }
          description: All email IDs ordered most-urgent first
        reasoning:
          type: string
          nullable: true
          description: Brief explanation of the ranking logic
      required: [ranked_email_ids]

# ---------------------------------------------------------------------------
# Reward
# ---------------------------------------------------------------------------
reward:
  range: [0.0, 1.0]
  partial_credit: true
  description: >
    Intermediate steps return min(0.1, partial_grade * progress) — a real
    dampened partial score so the agent knows it is on the right track.
    On episode completion the full task-specific grader runs and returns
    the final score in [0.0, 1.0].

# ---------------------------------------------------------------------------
# Tasks
# ---------------------------------------------------------------------------
tasks:
  - id: task_1
    name: Email Urgency Classification
    difficulty: easy
    num_emails: 6
    action_type: classify_urgency
    max_steps: 10
    scoring: >
      Per email: 1.0 correct, 0.3 off-by-one level (urgent<->normal or normal<->low),
      0.0 wrong. Final = sum / 6.

  - id: task_2
    name: Action Item Extraction
    difficulty: medium
    num_emails: 3
    action_type: extract_actions
    max_steps: 10
    scoring: >
      Per email: 0.40 fuzzy assignee recall (difflib) + 0.40 keyword coverage
      + 0.20 summary quality (length > 20 chars). Averaged over 3 emails.

  - id: task_3
    name: Full Email Triage
    difficulty: hard
    num_emails: 3
    action_type: full_triage
    max_steps: 15
    scoring: >
      Per email: 0.25 urgency + 0.25 department routing + 0.20 action-items quality
      (count, assignees, due dates) + 0.15 reply subject + 0.15 immediate-response flag.
      Averaged over 3 emails.

  - id: task_4
    name: Email Priority Ranking
    difficulty: hard
    num_emails: 10
    action_type: prioritize_emails
    max_steps: 3
    scoring: >
      Single action. Score = 0.65 * Spearman rank correlation + 0.35 * top-3 accuracy.
      Normalized to [0.0, 1.0]. Agent may retry up to max_steps times; last submission scores.

# ---------------------------------------------------------------------------
# HTTP Endpoints
# ---------------------------------------------------------------------------
endpoints:
  reset:
    method: POST
    path: /reset
    body:
      task_id:    { type: string, default: task_1 }
      session_id: { type: string, nullable: true, description: "Auto-generated UUID if omitted" }
    returns: ResetResponse (includes session_id for all subsequent calls)

  step:
    method: POST
    path: /step
    body:
      session_id: { type: string }
      action:     { type: object, description: "See action_space variants above" }
    returns: StepResult (observation, reward, done, info)

  state:
    method: GET
    path: /state
    query:
      session_id: { type: string, required: true }
    returns: StateResponse (task_id, step_count, done, cumulative_reward)

  tasks:
    method: GET
    path: /tasks
    returns: List of task metadata

  health:
    method: GET
    path: /health
    returns: "{ status: ok, version, active_sessions }"

  delete_session:
    method: DELETE
    path: /session/{session_id}
    description: Free memory after a finished episode

# ---------------------------------------------------------------------------
# Docker / Deployment
# ---------------------------------------------------------------------------
docker:
  port: 7860
  host: "0.0.0.0"
  env:
    PORT: "7860"
  cmd: ["python", "app.py"]
  notes: >
    PORT env var controls the listen port (default 7860 for HF Spaces).
    Set PORT=7861 for local development if needed.
